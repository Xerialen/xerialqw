alias __check_gear_sync               "__set_weapon_string"
alias __coming                        "if ('$health' < '1') then __lost else .msg.coming"
alias __dead                          "if ('$matchtype' == '2on2') then .lost else if ('$weapon' == '$tp_name_lg') then .left_pack lg- else if ('$weapon' == '$tp_name_rl') then .left_pack rl- else .lost"
alias __do_nothing                    ""
alias __enemy_powerup                 ".msg.enemy.powerup"
alias __enemy_powerups                ".enemy_powerups"
alias __enemy_rl                      ".enemy_rl"
alias __enemy_rl_dead                 ".enemy_rl_dead"
alias __get_my_stuff                  "__weapon_switch; if ($health < 1) then __dead else if ($bestweapon isin '$tp_name_rl $tp_name_lg') then .get_my $bestweapon else if ($cells > 0) then .get_my cells:$cells else if (('$mapname' = 'e1m2' or '$mapname' = 'dm2') and $rockets > 0) then .get_my rockets:$rockets"
alias __get_pent                      "if ('$tp_name_pent' isin '$powerups') then __team_powerups 		else .get $tp_name_pent"
alias __get_quad                      "if ('$tp_name_quad' isin '$powerups') then __team_powerups 		else .get $tp_name_quad"
alias __get_ring                      "if ('$tp_name_ring' isin '$powerups') then __team_powerups       else .get $tp_name_ring"
alias __getpent                       ".msg.getpent"
alias __getquad                       ".msg.getquad"
alias __help                          "say_team $\$__name {$__yellowhelp$__white} $[{$loc}$] $bestweapon $powerups"
alias __itemsoon                      ".item_soon"
alias __left_pack                     ".left_pack"
alias __lost                          "if ('$weapon' = '$tp_name_rl') then .msg.lost.pack else if ('$weapon' = '$tp_name_lg') then .msg.lost.pack else .msg.lost"
alias __map_trick                     "if ('$mapname' isin 'dm2 dm3') then __map_trick_$mapname 		else .trick"
alias __map_trick_dm2                 "if ('big' isin '$location') then .quad_jump	else if ('quad' isin '$location') then .quad_jump	else if ('high' isin '$location') then .quad_jump	else if ('water' isin '$location') then .quad_jump else if ('ng' isin '$location') then .quad_jump	else if ('secret' isin '$location') then .quad_jump else if ('tele' isin '$location') then .slipped		else if ('button' isin '$location') then .open else __sync"
alias __map_trick_dm3                 "if ('water' isin '$location') then .discharge		else if ('quad' isin '$location') then .delay		else if ('pent' isin '$location') then .delay		else if ('lift' isin '$location') then .delay		else __sync"
alias __need                          "if ($health < 1) then __dead else if ('$need' = '$tp_name_nothing') then __report else .need"
alias __nmypent                       "say_team $\  {&cf00enemy pent}"
alias __nmyquad                       "say_team $\  {&cf19enemy quad}"
alias __nmyring                       "say_team $\  enemy ring"
alias __point                         "if ('$tp_name_nothing' isin '$point') then else if ('$ledpoint' = '$tp_name_status_green') then else if ('$ledpoint') = '$tp_name_status_red') then __point_powerup else .msg.point"
alias __point_enemy                   "if ('$tp_name_enemy' isin '$point') then .msg.point.enemy"
alias __point_eyes                    "if ('$tp_name_quaded' isin '$point') then __point_eyes_quaded else if ('$tp_name_pented') isin '$point') then .msg.point_eyes_pented else .msg.point.eyes"
alias __point_eyes_quaded             "if ('$tp_name_pented' isin '$point') then .msg.point.eyes.quad.pented else .msg.point.eyes.quaded"
alias __point_powerup                 "if ('$tp_name_eyes' isin '$point') then __point_eyes else if ('$tp_name_quaded' isin '$point') then __point_quaded else if ('$tp_name_pented' isin '$point') then .msg.point.pented else .msg.point"
alias __point_quaded                  "if ('$tp_name_pented' isin '$point') then .msg.point.quaded.pented else .msg.point.quaded"
alias __prepend                       "set_tp %1 %2$%1"
alias __quad_over                     "if ('$tp_name_quad' isin '$powerups') then __team_powerups 		else .quad_over"
alias __quadover                      ".msg.quadover"
alias __replace                       "__say_team replace"
alias __report                        "__say_team report"
alias __waiting 		      "say_team $\$__name {$__yellowwaiting$__white} $[{$location}$] $bestweapon $powerups"
alias __reset                         "set_tp %1 $qt$qt"
alias __safe                          "if ('$health' < '1') then __lost else .msg.safe"
alias __say_team                      "if ($health < 1) then __dead %1 else __alive %1"
alias __set_white                     "set_tp %1 {%2}"
alias __shownick                      "if_exists alias shownick shownick __do_nothing"
alias __sreport                       "if ('$health' < '1') then __lost else if ('$bestweapon' = '$tp_name_lg') then __status_report_lg_check else if ('$bestweapon' = '$tp_name_rl') then __status_report_rl_check else __status_report_normal"
alias __sreport_lg_check              "if ('$tp_name_quad' isin '$powerups') then .msg.status.report.lg.pup else .msg.status.report.lg"
alias __status_report                 "if ('$bestweapon' = '$tp_name_lg') then __status_report_lg_check else if ('$bestweapon' = '$tp_name_rl') then __status_report_rl_check else __status_report_normal"
alias __status_report_lg_check        "if ('$rockets' > '0') then .msg.status.report.lg.rox else .msg.status.report.lg"
alias __status_report_normal          "if ('$cells' > '0') then __status_report_normal_check else if ('$rockets' > '0') then .msg.status.report.rox else if ('$bestweapon' = '$tp_name_sg') then .msg.status.nada else .msg.status.report"
alias __status_report_normal_check    "if ('$rockets' > '0') then .msg.status.report.rox.cells else .msg.status.report.cells"
alias __status_report_rl_check        "if ('$tp_name_lg' isin '$weapons') then .msg.status.report.rl.lg else if ('$cells' > '0') then .msg.status.report.rl.cells else .msg.status.report.rl"
alias __sync                          "if ($bestweapon isin '$tp_name_sg') then .attack 		else __say_team sync"
alias __team_powerups                 "if ('$powerups' = '') then __do_nothing else if ('$tp_name_ring' isin '$powerups') then .team_powerups_ring else if ( $health < 1 AND '$tp_name_quad' isin '$powerups' ) then .quad_over else .team_powerups"
alias __took                          "if ('$took' == '$tp_name_nothing') then else if ('$took' isin '$tp_name_pent $tp_name_quad $tp_name_ring') then .msg.took.powerup else .msg.took"
alias __trick                         "if ($health < 1) then __dead		else if ('rl' isin '$weapons') then __trick_rl		else __map_trick"
alias __trick_rl                      "if ($armor > 40 or $health > 50 or 'pent' isin '$powerups') then __map_trick 		else __get_my_stuff"
alias __weapon_switch                 "impulse 7 8 6 5 3 2"
